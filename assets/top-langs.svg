<svg xmlns="http://www.w3.org/2000/svg" width="380" height="234" viewBox="0 0 380 234" role="img" aria-labelledby="languages-title languages-desc">
  <title id="languages-title">KangDohwa most used languages</title>
  <desc id="languages-desc">Language distribution by bytes across personal repositories and organizations owned by KangDohwa.</desc>
  <defs><style>
      text { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .card { fill: #ffffff; stroke: #e2e8f0; }
      .title { fill: #0f172a; font-weight: 700; }
      .subtitle, .label { fill: #64748b; }
      .value, .language { fill: #1e293b; font-weight: 600; }
      .track { fill: #e2e8f0; }
      @media (prefers-color-scheme: dark) {
        .card { fill: #0d1117; stroke: #30363d; }
        .title { fill: #f0f6fc; }
        .subtitle, .label { fill: #8b949e; }
        .value, .language { fill: #c9d1d9; }
        .track { fill: #30363d; }
      }
    </style></defs>
  <rect class="card" x="0.5" y="0.5" width="379" height="233" rx="12"/>
  <text class="title" x="24" y="34" font-size="19">Most Used Languages</text>
  <text class="subtitle" x="24" y="55" font-size="11">Personal repositories + 6 owner organizations</text>
  <rect class="track" x="154" y="71" width="150" height="8" rx="4"/><rect x="154" y="71" width="90.2" height="8" rx="4" fill="#178600"/><circle cx="28" cy="79" r="5" fill="#178600"/><text class="language" x="42" y="83" font-size="13">C#</text><text class="label" x="352" y="83" font-size="12" text-anchor="end">60.1%</text><rect class="track" x="154" y="97" width="150" height="8" rx="4"/><rect x="154" y="97" width="43.2" height="8" rx="4" fill="#DA5B0B"/><circle cx="28" cy="105" r="5" fill="#DA5B0B"/><text class="language" x="42" y="109" font-size="13">Jupyter Notebook</text><text class="label" x="352" y="109" font-size="12" text-anchor="end">28.8%</text><rect class="track" x="154" y="123" width="150" height="8" rx="4"/><rect x="154" y="123" width="8.7" height="8" rx="4" fill="#dea584"/><circle cx="28" cy="131" r="5" fill="#dea584"/><text class="language" x="42" y="135" font-size="13">Rust</text><text class="label" x="352" y="135" font-size="12" text-anchor="end">5.8%</text><rect class="track" x="154" y="149" width="150" height="8" rx="4"/><rect x="154" y="149" width="2.1" height="8" rx="4" fill="#3572A5"/><circle cx="28" cy="157" r="5" fill="#3572A5"/><text class="language" x="42" y="161" font-size="13">Python</text><text class="label" x="352" y="161" font-size="12" text-anchor="end">1.4%</text><rect class="track" x="154" y="175" width="150" height="8" rx="4"/><rect x="154" y="175" width="2.0" height="8" rx="4" fill="#f34b7d"/><circle cx="28" cy="183" r="5" fill="#f34b7d"/><text class="language" x="42" y="187" font-size="13">C++</text><text class="label" x="352" y="187" font-size="12" text-anchor="end">1.4%</text><rect class="track" x="154" y="201" width="150" height="8" rx="4"/><rect x="154" y="201" width="2.0" height="8" rx="4" fill="#e34c26"/><circle cx="28" cy="209" r="5" fill="#e34c26"/><text class="language" x="42" y="213" font-size="13">HTML</text><text class="label" x="352" y="213" font-size="12" text-anchor="end">1.3%</text>
