name: Update profile activity

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Update profile data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          PROFILE_USERNAME: KangDohwa
          PROFILE_REPOSITORY_OWNER: KangDohwa
        run: python3 scripts/update_readme.py

      - name: Generate GitHub statistics cards
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          PROFILE_USERNAME: KangDohwa
        run: python3 scripts/update_github_stats.py

      - name: Commit changes
        run: |
          if git diff --quiet -- README.md assets/github-stats.svg assets/top-langs.svg; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/github-stats.svg assets/top-langs.svg
          git commit -m "chore: update profile data"
          git push
