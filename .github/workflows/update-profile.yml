name: Update profile activity

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v6

      - name: Update recent public activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: KangDohwa
          PROFILE_REPOSITORY_OWNER: KangDohwa
        run: python3 scripts/update_readme.py

      - name: Commit changes
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update profile activity"
          git push
